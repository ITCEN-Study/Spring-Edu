<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Product Shop</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@700&display=swap');

    body {
        font-family: 'Nanum Gothic', sans-serif;
        text-align: center;
    }

    h3 {
        margin-top: 20px;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(5, 180px);
        grid-template-rows: repeat(2, auto);
        gap: 20px;
        justify-content: center;
        margin-top: 30px;
    }

    .image-box {
        border: 1px solid black;
        box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.5);
        padding: 5px;
        background-color: white;
        display: inline-block;
    }

    .image-box img {
        width: 150px;
        height: 150px;
        display: block;
    }
    
    .basket-container {
        display: inline-block;
        text-align: left;
        padding: 20px;
        border-radius: 15px;
        background-color: #d1d9e6;
        box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
        margin-top: 50px;
        min-width: 300px;
    }
    
    .basket-container ul {
        list-style-type: disc;
        padding-left: 20px;
    }
    
    .basket-links {
        margin-top: 20px;
    }
    
    .basket-links a {
        display: block;
        color: black;
        text-decoration: none;
        margin-bottom: 5px;
    }
    
    .basket-links a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

    <div th:if="${view == 'product'}">
        <h3>원하는 상품을 클릭해 주세요!! 마구마구^^</h3>
        <hr>
        <div class="container">
            <div class="image-box" th:each="i : ${#numbers.sequence(1, 10)}">
                <a th:href="@{/basket(pid='p0' + ${i < 10 ? '0' + i : i})}">
                    <img th:src="@{/images/c{num}.jpg(num=${i})}" th:alt="'img' + ${i}">
                </a>
            </div>
        </div>
    </div>

    <div th:if="${view == 'basket'}">
        <div class="basket-container">
            <div th:if="${basket != null and !basket.isEmpty()}">
                <h3>선택한 상품 리스트</h3>
                <hr>
                <ul>
                    <li th:each="entry : ${basket}" th:text="|${entry.key} 상품 ${entry.value}개|"></li>
                </ul>
                <div class="basket-links">
                    <a th:href="@{/basket(pid='clear')}">상품비우기</a>
                    <a th:href="@{/product}">상품선택하기</a>
                </div>
            </div>
            <div th:if="${basket == null or basket.isEmpty()}">
                <h3>선택한 상품이 없어요.</h3>
                <div class="basket-links">
                    <a th:href="@{/product}">상품선택하기</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
