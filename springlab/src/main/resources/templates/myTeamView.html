<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>우리팀 소개</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        h1 { color: #2c3e50; }
        button {
            padding: 8px 15px;
            margin-right: 5px;
            cursor: pointer;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Noto Sans KR', sans-serif;
        }
        button:hover {
            background-color: #e2e6ea;
        }
        ul { list-style-type: none; padding-left: 0; }
        li {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        b, span[th\:text] { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>
    <h1>우리팀 소개</h1>
    <hr>

    <button type="button" onclick="location.href='/myTeam1?action=name'">우리 팀명</button>
    <button type="button" onclick="location.href='/myTeam1?action=member'">우리 팀원</button>

    <div th:if="${myteam.teamName != null}">
        <p th:if="${myteam.teamMember == null}">
            우리 팀의 팀명은 <b th:text="${myteam.teamName}">팀명</b>입니다.
        </p>
    </div>

    <div th:if="${myteam.teamMember != null}">
        <h3><span th:text="${myteam.teamName}">팀명</span> 팀의 팀원들을 소개합니다.</h3>
        <ul>
            <li th:each="member : ${myteam.teamMember}">
                <span th:text="${member.name}">이름</span>: 
                별명은 <span th:text="${member.nicName}">별명</span>이고 
                좋아하는 음식은 <span th:text="${member.food}">음식</span>입니다.
            </li>
        </ul>
    </div>

</body>
</html>
