<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>우리팀 소개</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        h1 { color: #2c3e50; }
        button {
            padding: 8px 15px;
            margin-right: 5px;
            cursor: pointer;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: bold;
        }
        button:hover {
            background-color: #e2e6ea;
        }
        ul { list-style-type: disc; padding-left: 20px; }
        li {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
        b { color: #e67e22; font-weight: bold; }
        #result { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>우리팀 소개</h1>
    <hr>

    <button type="button" onclick="displayTeamName()">우리 팀명</button>
    <button type="button" onclick="displayTeamMembers()">우리 팀원</button>

    <div id="result"></div>

    <script>
        function displayTeamName() {
            let xhr = new XMLHttpRequest();
            xhr.onload = function() {
                if (xhr.status == 200) {
                    const data = JSON.parse(xhr.responseText);
                    const resultDiv = document.getElementById('result');
                    resultDiv.innerHTML = `<p>우리 팀의 팀명은 <b>${data.teamName}</b>입니다.</p>`;
                }
            };
            xhr.open('GET', '/myTeam2', true);
            xhr.send();
        }

        function displayTeamMembers() {
            let xhr = new XMLHttpRequest();
            xhr.onload = function() {
                if (xhr.status == 200) {
                    const data = JSON.parse(xhr.responseText);
                    const resultDiv = document.getElementById('result');
                    let html = `<h3><b>${data.teamName}</b>팀의 팀원들을 소개합니다.</h3>`;
                    html += `<ul>`;
                    data.teamMember.forEach(member => {
                        html += `<li><b>${member.name}</b>: 별명은 <b>${member.nicName}</b>이고 좋아하는 음식은 <b>${member.food}</b>입니다.</li>`;
                    });
                    html += `</ul>`;
                    resultDiv.innerHTML = html;
                }
            };
            xhr.open('GET', '/myTeam2', true);
            xhr.send();
        }
    </script>
</body>
</html>
