<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Insert title here</title>
</head>
<body>
<h2>연산할 두개의 숫자를 입력하고 연산자를 선택하시오.</h2>
<hr>
<form method="post" action="/calc">
  <input type="number" name="num1" placeholder="숫자를 입력하세요" required>
  <select name="operator">
    <option value="plus">+</option>
    <option value="minus">-</option>
    <option value="times">*</option>
    <option value="div">/</option>
  </select>
  <input type="number" name="num2" placeholder="숫자를 입력하세요" required>
  <input type="submit" value="계산하기">
</form>
</body>
</html>
