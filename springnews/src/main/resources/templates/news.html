<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>뉴스 게시판</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        table { width: 80%; margin: 20px auto; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; }
        th { background-color: #f8bbd0; }
        .search-container { margin: 20px; }
        .btn { padding: 5px 15px; text-decoration: none; border: 1px solid #333; color: black; background-color: #e0f7fa; cursor: pointer; }
        .btn-blue { background-color: #e0f7fa; }
        .form-container { width: 50%; margin: 20px auto; border: 1px solid #ddd; padding: 20px; background-color: #f9f9f9; text-align: left; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        .msg { color: red; margin: 10px; }
    </style>
    <script>
        function displayInsertForm() {
            location.href = "/newsmain?action=insert";
        }
        function cancel() {
            location.href = "/newsmain";
        }
        function editNews() {
            document.getElementById('writer').readOnly = false;
            document.getElementById('title').readOnly = false;
            document.getElementById('content').readOnly = false;
            document.getElementById('updateBtn').style.display = 'inline-block';
            document.getElementById('editBtn').style.display = 'none';
        }
    </script>
</head>
<body>
    <h1>뉴스 게시판</h1>

    <div class="search-container">
        <form action="/search" method="get">
            <input type="text" name="keyword" placeholder="내용 검색">
            <button type="submit" class="btn btn-blue">검색</button>
        </form>
    </div>

    <p class="msg" th:if="${msg}" th:text="${msg}"></p>

    <table>
        <thead>
            <tr>
                <th>번호</th>
                <th>제목</th>
                <th>작성자</th>
                <th>작성일</th>
                <th>조회수</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${list}">
                <td th:text="${item.id}">1</td>
                <td><a th:href="@{/one(id=${item.id})}" th:text="${item.title}">제목</a></td>
                <td><a th:href="@{/writer(name=${item.writer})}" th:text="${item.writer}">작성자</a></td>
                <td th:text="${#temporals.format(item.writedate, 'yyyy-MM-dd')}">2026-05-01</td>
                <td th:text="${item.cnt}">0</td>
            </tr>
        </tbody>
    </table>

    <div th:if="${list != null}">
        <button class="btn btn-blue" onclick="displayInsertForm()">뉴스 작성</button>
    </div>

    <!-- Insert Form -->
    <div class="form-container" th:if="${insert}">
        <h3>뉴스 작성</h3>
        <form action="/insert" method="post">
            <div class="form-group">
                <label>제목</label>
                <input type="text" name="title" required>
            </div>
            <div class="form-group">
                <label>작성자</label>
                <input type="text" name="writer" required>
            </div>
            <div class="form-group">
                <label>뉴스 내용</label>
                <textarea name="content" rows="5" required></textarea>
            </div>
            <div style="text-align: center;">
                <button type="submit" class="btn btn-blue">작성</button>
                <button type="reset" class="btn btn-blue">재작성</button>
                <button type="button" class="btn btn-blue" onclick="cancel()">취소</button>
            </div>
        </form>
    </div>

    <!-- View / Update Form -->
    <div class="form-container" th:if="${news}">
        <h3>뉴스 내용</h3>
        <form action="/update" method="post">
            <input type="hidden" name="id" th:value="${news.id}">
            <div class="form-group">
                <label>제목</label>
                <input type="text" id="title" name="title" th:value="${news.title}" readonly required>
            </div>
            <div class="form-group">
                <label>작성자</label>
                <input type="text" id="writer" name="writer" th:value="${news.writer}" readonly required>
            </div>
            <div class="form-group">
                <label>뉴스 내용</label>
                <textarea id="content" name="content" rows="5" th:text="${news.content}" readonly required></textarea>
            </div>
            <div style="text-align: center;">
                <button type="button" class="btn btn-blue" onclick="cancel()">확인</button>
                <button type="button" id="editBtn" class="btn btn-blue" onclick="editNews()">수정</button>
                <button type="submit" id="updateBtn" class="btn btn-blue" style="display:none;">저장</button>
                <a th:href="@{/delete(id=${news.id})}" class="btn btn-blue">삭제</a>
            </div>
        </form>
    </div>

</body>
</html>
